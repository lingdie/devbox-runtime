name: Build All Expt Images And Runtimes

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the Docker image'
        required: true
        default: 'latest'
      tools_version:
        description: 'Base tools version (optional, defaults to tag if not specified)'
        required: false
        type: string
        default: ''
      os_version:
        description: 'OS image version (optional, defaults to tag if not specified)'
        required: false
        type: string
        default: ''
      framework_image_version:
        description: 'Framework image version (optional, defaults to tag if not specified)'
        required: false
        type: string
        default: ''
      target_kind:
        description: 'Build all kinds or narrow to one kind before applying target_name'
        required: false
        type: choice
        options:
          - all
          - operating-systems
          - languages
          - frameworks
        default: 'all'
      target_name:
        description: 'Optional package folder or subpath (for example: debian/12.6, node.js/20, nest.js/v11)'
        required: false
        type: string
        default: ''
      target_build_type:
        description: 'Build images, runtimes, or both for the selected target; use runtimes for one-click framework runtime builds'
        required: false
        type: choice
        options:
          - all
          - images
          - runtimes
        default: 'all'
      include_prerequisites:
        description: 'When targeting a subset, also build required upstream tools/images first (recommended for single runtime builds)'
        required: false
        type: boolean
        default: true
      l10n:
        description: 'Localization setting (choose one or both)'
        required: false
        type: choice
        options:
          - en_US
          - zh_CN
          - both
        default: 'en_US'
      arch:
        description: 'System architecture (choose one or both)'
        required: false
        type: choice
        options:
          - amd64
          - arm64
          - both
        default: 'amd64'
      aliyun_enabled:
        description: 'Enable Aliyun ACR login, image push, and manifest publish'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  resolve-plan:
    name: Resolve Build Plan
    runs-on: ubuntu-latest
    outputs:
      build_tools: ${{ steps.plan.outputs.build_tools }}
      effective_tools_version: ${{ steps.plan.outputs.effective_tools_version }}
      build_os_base: ${{ steps.plan.outputs.build_os_base }}
      os_base_name: ${{ steps.plan.outputs.os_base_name }}
      build_language_base: ${{ steps.plan.outputs.build_language_base }}
      language_base_name: ${{ steps.plan.outputs.language_base_name }}
      build_framework_base: ${{ steps.plan.outputs.build_framework_base }}
      framework_base_name: ${{ steps.plan.outputs.framework_base_name }}
      build_os_runtime: ${{ steps.plan.outputs.build_os_runtime }}
      os_runtime_name: ${{ steps.plan.outputs.os_runtime_name }}
      build_language_runtime: ${{ steps.plan.outputs.build_language_runtime }}
      language_runtime_name: ${{ steps.plan.outputs.language_runtime_name }}
      build_framework_runtime: ${{ steps.plan.outputs.build_framework_runtime }}
      framework_runtime_name: ${{ steps.plan.outputs.framework_runtime_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve requested stages
        id: plan
        run: |
          python3 .github/scripts/expt-build.py resolve-plan \
            --target-kind "${{ inputs.target_kind }}" \
            --target-name "${{ inputs.target_name }}" \
            --target-build-type "${{ inputs.target_build_type }}" \
            --include-prerequisites "${{ inputs.include_prerequisites }}" \
            --effective-tools-version "${{ inputs.tools_version != '' && inputs.tools_version || inputs.tag }}"

  build-tools:
    name: Tools Image
    needs: resolve-plan
    if: ${{ needs.resolve-plan.outputs.build_tools == 'true' }}
    uses: ./.github/workflows/build-expt-tools.yml
    with:
      image_tag: ${{ inputs.tools_version != '' && inputs.tools_version || inputs.tag }}
      architectures: ${{ inputs.arch == 'both' && 'amd64,arm64' || inputs.arch }}
      push: true
    secrets: inherit

  build-os-base:
    name: Base Images (OS)
    needs: [resolve-plan, build-tools]
    if: ${{ always() && needs.resolve-plan.outputs.build_os_base == 'true' && (needs.resolve-plan.outputs.build_tools != 'true' || needs['build-tools'].result == 'success') }}
    uses: ./.github/workflows/build-expt-image-or-runtime.yaml
    with:
      tag: ${{ inputs.tag }}
      kind: operating-systems
      name: ${{ needs.resolve-plan.outputs.os_base_name }}
      build_type: images
      tools_version: ${{ needs['build-tools'].result == 'success' && needs['build-tools'].outputs.image_tag || needs.resolve-plan.outputs.effective_tools_version }}
      os_version: ${{ inputs.os_version }}
      framework_image_version: ${{ inputs.framework_image_version }}
      l10n: ${{ inputs.l10n }}
      arch: ${{ inputs.arch }}
      aliyun_enabled: ${{ inputs.aliyun_enabled }}
    secrets: inherit

  build-language-base:
    name: Base Images (Languages)
    needs: [resolve-plan, build-tools, build-os-base]
    if: ${{ always() && needs.resolve-plan.outputs.build_language_base == 'true' && (needs.resolve-plan.outputs.build_tools != 'true' || needs['build-tools'].result == 'success') && (needs.resolve-plan.outputs.build_os_base != 'true' || needs['build-os-base'].result == 'success') }}
    uses: ./.github/workflows/build-expt-image-or-runtime.yaml
    with:
      tag: ${{ inputs.tag }}
      kind: languages
      name: ${{ needs.resolve-plan.outputs.language_base_name }}
      build_type: images
      tools_version: ${{ needs['build-tools'].result == 'success' && needs['build-tools'].outputs.image_tag || needs.resolve-plan.outputs.effective_tools_version }}
      os_version: ${{ inputs.os_version }}
      framework_image_version: ${{ inputs.framework_image_version }}
      l10n: ${{ inputs.l10n }}
      arch: ${{ inputs.arch }}
      aliyun_enabled: ${{ inputs.aliyun_enabled }}
    secrets: inherit

  build-framework-base:
    name: Base Images (Frameworks)
    needs: [resolve-plan, build-tools, build-os-base, build-language-base]
    if: ${{ always() && needs.resolve-plan.outputs.build_framework_base == 'true' && (needs.resolve-plan.outputs.build_tools != 'true' || needs['build-tools'].result == 'success') && (needs.resolve-plan.outputs.build_os_base != 'true' || needs['build-os-base'].result == 'success') && (needs.resolve-plan.outputs.build_language_base != 'true' || needs['build-language-base'].result == 'success') }}
    uses: ./.github/workflows/build-expt-image-or-runtime.yaml
    with:
      tag: ${{ inputs.tag }}
      kind: frameworks
      name: ${{ needs.resolve-plan.outputs.framework_base_name }}
      build_type: images
      tools_version: ${{ needs['build-tools'].result == 'success' && needs['build-tools'].outputs.image_tag || needs.resolve-plan.outputs.effective_tools_version }}
      os_version: ${{ inputs.os_version }}
      framework_image_version: ${{ inputs.framework_image_version }}
      l10n: ${{ inputs.l10n }}
      arch: ${{ inputs.arch }}
      aliyun_enabled: ${{ inputs.aliyun_enabled }}
    secrets: inherit

  build-os-runtime:
    name: Runtime Images (OS)
    needs: [resolve-plan, build-tools, build-os-base]
    if: ${{ always() && needs.resolve-plan.outputs.build_os_runtime == 'true' && (needs.resolve-plan.outputs.build_tools != 'true' || needs['build-tools'].result == 'success') && (needs.resolve-plan.outputs.build_os_base != 'true' || needs['build-os-base'].result == 'success') }}
    uses: ./.github/workflows/build-expt-image-or-runtime.yaml
    with:
      tag: ${{ inputs.tag }}
      kind: operating-systems
      name: ${{ needs.resolve-plan.outputs.os_runtime_name }}
      build_type: runtimes
      tools_version: ${{ needs['build-tools'].result == 'success' && needs['build-tools'].outputs.image_tag || needs.resolve-plan.outputs.effective_tools_version }}
      os_version: ${{ inputs.os_version }}
      framework_image_version: ${{ inputs.framework_image_version }}
      l10n: ${{ inputs.l10n }}
      arch: ${{ inputs.arch }}
      aliyun_enabled: ${{ inputs.aliyun_enabled }}
    secrets: inherit

  build-language-runtime:
    name: Runtime Images (Languages)
    needs: [resolve-plan, build-tools, build-language-base]
    if: ${{ always() && needs.resolve-plan.outputs.build_language_runtime == 'true' && (needs.resolve-plan.outputs.build_tools != 'true' || needs['build-tools'].result == 'success') && (needs.resolve-plan.outputs.build_language_base != 'true' || needs['build-language-base'].result == 'success') }}
    uses: ./.github/workflows/build-expt-image-or-runtime.yaml
    with:
      tag: ${{ inputs.tag }}
      kind: languages
      name: ${{ needs.resolve-plan.outputs.language_runtime_name }}
      build_type: runtimes
      tools_version: ${{ needs['build-tools'].result == 'success' && needs['build-tools'].outputs.image_tag || needs.resolve-plan.outputs.effective_tools_version }}
      os_version: ${{ inputs.os_version }}
      framework_image_version: ${{ inputs.framework_image_version }}
      l10n: ${{ inputs.l10n }}
      arch: ${{ inputs.arch }}
      aliyun_enabled: ${{ inputs.aliyun_enabled }}
    secrets: inherit

  build-framework-runtime:
    name: Runtime Images (Frameworks)
    needs: [resolve-plan, build-tools, build-framework-base]
    if: ${{ always() && needs.resolve-plan.outputs.build_framework_runtime == 'true' && (needs.resolve-plan.outputs.build_tools != 'true' || needs['build-tools'].result == 'success') && (needs.resolve-plan.outputs.build_framework_base != 'true' || needs['build-framework-base'].result == 'success') }}
    uses: ./.github/workflows/build-expt-image-or-runtime.yaml
    with:
      tag: ${{ inputs.tag }}
      kind: frameworks
      name: ${{ needs.resolve-plan.outputs.framework_runtime_name }}
      build_type: runtimes
      tools_version: ${{ needs['build-tools'].result == 'success' && needs['build-tools'].outputs.image_tag || needs.resolve-plan.outputs.effective_tools_version }}
      os_version: ${{ inputs.os_version }}
      framework_image_version: ${{ inputs.framework_image_version }}
      l10n: ${{ inputs.l10n }}
      arch: ${{ inputs.arch }}
      aliyun_enabled: ${{ inputs.aliyun_enabled }}
    secrets: inherit

  build-summary:
    runs-on: ubuntu-latest
    needs:
      [
        resolve-plan,
        build-tools,
        build-os-base,
        build-language-base,
        build-framework-base,
        build-os-runtime,
        build-language-runtime,
        build-framework-runtime
      ]
    if: always()
    steps:
      - name: Download image lists
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: image-list-*
          path: image-lists

      - name: Write image list summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -d image-lists ]; then
            find image-lists -type f -print0 | xargs -0 cat | sed '/^[[:space:]]*$/d' | sort -u > "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if any planned builds failed
        if: ${{ needs['resolve-plan'].result != 'success' || (needs.resolve-plan.outputs.build_tools == 'true' && needs['build-tools'].result != 'success') || (needs.resolve-plan.outputs.build_os_base == 'true' && needs['build-os-base'].result != 'success') || (needs.resolve-plan.outputs.build_language_base == 'true' && needs['build-language-base'].result != 'success') || (needs.resolve-plan.outputs.build_framework_base == 'true' && needs['build-framework-base'].result != 'success') || (needs.resolve-plan.outputs.build_os_runtime == 'true' && needs['build-os-runtime'].result != 'success') || (needs.resolve-plan.outputs.build_language_runtime == 'true' && needs['build-language-runtime'].result != 'success') || (needs.resolve-plan.outputs.build_framework_runtime == 'true' && needs['build-framework-runtime'].result != 'success') }}
        run: exit 1
